<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pro Chess Arena</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="left-panel">
      <div class="title-wrap">
        <h1>Pro Chess Arena</h1>
        <p>Vanilla JS • Full Rules • Drag & Drop • Minimax AI</p>
      </div>

      <div class="controls">
        <a href="https://chsachinja8-gif.github.io/portfolio/"> <button id="home">Home</button></a>
        <button id="restartBtn">Restart</button>
        <button id="undoBtn">Undo</button>
        <button id="flipBtn">Flip Board</button>
        <button id="aiBtn" aria-pressed="false">AI: Off</button>
      </div>

      <div class="status-panel">
        <h2 id="turnLabel">Turn: White</h2>
        <p id="stateLabel">Game in progress.</p>
      </div>

      <div id="board" class="board" aria-label="Chess board"></div>

      <div class="legend">
        <span><i class="dot legal"></i> legal move</span>
        <span><i class="dot capture"></i> capture</span>
        <span><i class="dot check"></i> king in check</span>
      </div>
    </section>

    <aside class="history-panel">
      <h2>Move History</h2>
      <ol id="historyList"></ol>
    </aside>
  </main>

  <div id="promotionModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="promotionTitle">
    <div class="modal-card">
      <h3 id="promotionTitle">Choose Promotion</h3>
      <div id="promotionOptions" class="promotion-options"></div>
    </div>
  </div>
  <!-- ✨ NEW - Checkmate Popup -->
<div id="winModal" class="hidden">
  <div class="modal-content">
    <h2 id="winMessage"></h2>
    <button id="playAgainBtn">Play Again</button>
  </div>
</div>

  <script src="script.js"></script>
</body>
</html>
